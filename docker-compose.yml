services:
  # ─── Base de données PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hrms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hrms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hrms_password}
      POSTGRES_DB: ${DB_NAME:-hrms_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-hrms_user} -d ${DB_NAME:-hrms_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms_network

  # ─── Redis (cache & sessions) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrms_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms_network

  # ─── Keycloak (Auth SSO + RBAC + multi-tenant) ────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: hrms_keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-hrms_db}
      KC_DB_USERNAME: ${DB_USER:-hrms_user}
      KC_DB_PASSWORD: ${DB_PASSWORD:-hrms_password}
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: 'true'
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hrms_network

  # ─── Backend NestJS ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: hrms_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-hrms_user}
      DB_PASSWORD: ${DB_PASSWORD:-hrms_password}
      DB_NAME: ${DB_NAME:-hrms_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      KEYCLOAK_URL: http://keycloak:8080
      JWT_SECRET: ${JWT_SECRET:-supersecretjwt}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-hrms-files}
      AWS_REGION: ${AWS_REGION:-ca-central-1}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./shared:/shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hrms_network

  # ─── Frontend React + Vite ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: hrms_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: hrms
      VITE_KEYCLOAK_CLIENT_ID: hrms-frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./shared:/shared
    depends_on:
      - backend
    networks:
      - hrms_network

  # ─── MinIO (S3 local pour développement) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: hrms_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin123}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - hrms_network

# ─── Volumes persistants ────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:

# ─── Réseau interne ─────────────────────────────────────────────────────────
networks:
  hrms_network:
    driver: bridge
